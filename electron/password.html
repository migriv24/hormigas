<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 180px;
      gap: 14px;
      user-select: none;
      -webkit-app-region: drag;
    }
    p { font-size: 13px; color: #14110F; font-weight: 600; }
    .row {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    input {
      padding: 8px 12px;
      border: 1.5px solid #dedad8;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      width: 190px;
      background: #fff;
      color: #14110F;
    }
    input:focus { border-color: #A4031F; }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .ok     { background: #A4031F; color: #fff; }
    .ok:hover { background: #8c0219; }
    .cancel { background: #e8e5e2; color: #14110F; }
    .cancel:hover { background: #d8d4d1; }
  </style>
</head>
<body>
  <p>Set a password for this file:</p>
  <div class="row">
    <input id="pw" type="password" placeholder="Password" autofocus>
    <button class="ok"     id="btnOk">Save</button>
    <button class="cancel" id="btnCancel">Cancel</button>
  </div>
  <script>
    const pw        = document.getElementById('pw')
    const btnOk     = document.getElementById('btnOk')
    const btnCancel = document.getElementById('btnCancel')

    btnOk.addEventListener('click', () => window.pwBridge.submit(pw.value || null))
    btnCancel.addEventListener('click', () => window.pwBridge.submit(null))
    pw.addEventListener('keydown', (e) => {
      if (e.key === 'Enter')  window.pwBridge.submit(pw.value || null)
      if (e.key === 'Escape') window.pwBridge.submit(null)
    })
  </script>
</body>
</html>
