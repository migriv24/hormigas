<div class="images-tab">

  <!-- Toolbar -->
  <div class="panel-toolbar" style="padding:12px 20px;flex-shrink:0;border-bottom:1px solid var(--border);">
    <div>
      <div style="font-size:17px;font-weight:700;">Image Library</div>
      <div style="font-size:12px;color:var(--text-muted);">Images uploaded to ImgBB — click any image to use it in your newsletter</div>
    </div>
    <span class="record-count" id="imageCount"></span>
    <div class="view-toggle-group" id="imgViewToggle" style="margin-left:auto;">
      <button class="btn btn-sm view-toggle-btn active" data-imgview="small"   title="Small grid">S</button>
      <button class="btn btn-sm view-toggle-btn"        data-imgview="medium"  title="Medium grid">M</button>
      <button class="btn btn-sm view-toggle-btn"        data-imgview="large"   title="Large grid">L</button>
      <button class="btn btn-sm view-toggle-btn"        data-imgview="detail"  title="Detail list">☰</button>
    </div>
    <button class="btn btn-outline btn-sm" id="imgTabImportBtn">🔗 Import URLs</button>
    <button class="btn btn-primary btn-sm" id="imgTabUploadBtn">⬆ Upload Image</button>
  </div>

  <!-- Filter bar -->
  <div id="imgFilterBar" class="img-filter-bar">
    <input type="search" id="imgSearchInput" placeholder="Search by name or tag…" autocomplete="off">
    <div id="imgTagFilterChips" class="img-filter-chips"></div>
    <button id="imgFilterClear" class="btn btn-sm btn-ghost" style="display:none;white-space:nowrap;">✕ Clear</button>
  </div>

  <!-- Upload zone (shown on demand) -->
  <div id="imgTabUploadZone" class="img-tab-upload-zone hidden">
    <div id="imgTabDropZone" class="uploader-drop img-tab-drop">
      <input type="file" id="imgTabFileInput" accept="image/*" style="display:none">
      <div>
        <div style="font-size:28px;margin-bottom:8px;">📷</div>
        <p style="margin:0 0 6px;">Drag &amp; drop an image here, or <span class="uploader-browse" id="imgTabBrowse">click to browse</span></p>
        <p style="margin:0;font-size:11px;color:var(--text-muted);">PNG, JPG, GIF, WEBP supported</p>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" id="imgTabCloseUpload" style="margin:8px auto 0;display:block;">
      ✕ Close upload zone
    </button>
  </div>

  <!-- Images grid — data-view is set by JS (small | medium | large | detail) -->
  <div id="imagesGrid" class="images-grid" data-view="small">
    <div class="images-loading">Loading images…</div>
  </div>

</div>

<!-- Image metadata edit modal -->
<div id="imgEditModal" class="modal-overlay hidden">
  <div class="modal-box" style="width:520px;">
    <div class="modal-header">
      <h2>Edit Image Details</h2>
      <button class="modal-close" id="imgEditClose">✕</button>
    </div>
    <div class="modal-body" id="imgEditBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="imgEditDelete" style="margin-right:auto;">
        🗑 Delete Image
      </button>
      <button class="btn btn-ghost" id="imgEditCancel">Cancel</button>
      <button class="btn btn-primary" id="imgEditSave">Save Changes</button>
    </div>
  </div>
</div>
